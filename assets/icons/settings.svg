<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Gear outer ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#9984d4" stroke-width="3" stroke-dasharray="8 4"/>
  <!-- Gear center -->
  <circle cx="32" cy="32" r="10" fill="#9984d4" opacity="0.3"/>
  <circle cx="32" cy="32" r="10" fill="none" stroke="#9984d4" stroke-width="2.5"/>
  <!-- Gear teeth -->
  <rect x="29" y="5"  width="6" height="10" rx="2" fill="#9984d4"/>
  <rect x="29" y="49" width="6" height="10" rx="2" fill="#9984d4"/>
  <rect x="5"  y="29" width="10" height="6" rx="2" fill="#9984d4"/>
  <rect x="49" y="29" width="10" height="6" rx="2" fill="#9984d4"/>
  <rect x="13" y="10" width="6" height="10" rx="2" fill="#9984d4" transform="rotate(45 16 15)"/>
  <rect x="45" y="10" width="6" height="10" rx="2" fill="#9984d4" transform="rotate(-45 48 15)"/>
  <rect x="13" y="44" width="6" height="10" rx="2" fill="#9984d4" transform="rotate(-45 16 49)"/>
  <rect x="45" y="44" width="6" height="10" rx="2" fill="#9984d4" transform="rotate(45 48 49)"/>
  <!-- Inner dot -->
  <circle cx="32" cy="32" r="4" fill="#9984d4"/>
</svg>
